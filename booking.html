<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>പുസ്തകം ബുക്കിംഗ് - നവയുഗ ക്ലബ്</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* ബുക്കിംഗ് പേജിന് മാത്രമായുള്ള പ്രത്യേക ഡിസൈൻ */
        .booking-container {
            max-width: 600px;
            margin: 120px auto 5px auto; /* മെനുവിന് താഴെയായി വരാൻ */
            padding: 30px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .booking-container h2 {
            color: #0f5132;
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #f9f9f9;
        }
        /* മാറ്റാൻ പാടില്ലാത്ത ഫീൽഡുകൾക്ക് (Readonly) */
        .form-group input[readonly] {
            background-color: #e9ecef;
            color: #495057;
            cursor: not-allowed;
            border-color: #ced4da;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #198754;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .btn-submit:hover {
            background-color: #146c43;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #0d6efd;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="booking-container">
        <h2><i class="fa-solid fa-bookmark"></i> പുസ്തകം റിസർവേഷൻ</h2>
        
        <form id="library-reservation-form">
            <div class="form-group">
                <label for="form-user-name">അംഗത്തിന്റെ പേര്:</label>
                <input type="text" id="form-user-name" readonly>
            </div>

            <div class="form-group">
                <label for="form-book-name">പുസ്തകത്തിന്റെ പേര്:</label>
                <input type="text" id="form-book-name" readonly>
            </div>

            <div class="form-group">
                <label for="form-author-name">എഴുത്തുകാരൻ:</label>
                <input type="text" id="form-author-name" readonly>
            </div>

            <div class="form-group">
                <label for="form-booked-date">ബുക്കിംഗ് തീയതി:</label>
                <input type="date" id="form-booked-date" readonly>
            </div>

            <div class="form-group">
                <label for="form-return-date">തിരികെ നൽകുന്ന തീയതി:</label>
                <input type="date" id="form-return-date" required style="background-color: #fff;">
            </div>

            <button type="submit" class="btn-submit">ബുക്കിംഗ് സമർപ്പിക്കുക</button>
        </form>

        <a href="library.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> തിരികെ ലൈബ്രറിയിലേക്ക് പോകാം</a>
    </div>

    <script src="app.js"></script>
</body>
</html>
