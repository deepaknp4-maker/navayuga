<!DOCTYPE html>
<html lang="ml">
<head>

     <!-- Google tag (gtag.js) ഗൂഗിൾ അനലിറ്റിക്സ് (Google Analytics) നിങ്ങളുടെ വെബ്സൈറ്റുമായി ബന്ധിപ്പിക്കുന്നത്-->

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
    body { background: #f4f4f9; }
    .profile-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .profile-card, .posts-card { background: #fff; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 20px; }
    .profile-card h2, .posts-card h2 { margin-top: 0; }
    .profile-card p { margin: 10px 0; line-height: 1.6; }
    .posts-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .post-item { border: 1px solid #e7e7e7; border-radius: 12px; padding: 18px; margin-bottom: 16px; background: #fcfcfc; }
    .post-item h3 { margin: 0 0 8px; font-size: 1.1rem; }
    .post-item p { margin: 0 0 12px; white-space: pre-wrap; line-height: 1.75; }
    .post-meta { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; color: #555; font-size: 0.95rem; }
    .delete-btn { background: #dc3545; color: #fff; border: none; border-radius: 10px; padding: 10px 16px; cursor: pointer; transition: background .2s ease; }
    .delete-btn:hover:not(:disabled) { background: #c82333; }
    .delete-btn:disabled { opacity: .65; cursor: not-allowed; }
    #posts-summary, #gallery-summary { color: #666; font-size: 0.95rem; }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin-top: 16px; }
    .gallery-card { border: 1px solid #e7e7e7; border-radius: 14px; overflow: hidden; background: #fff; }
    .gallery-card img { width: 100%; display: block; object-fit: cover; height: 220px; }
    .gallery-card .gallery-info { padding: 14px; }
    .gallery-card .gallery-caption { margin: 0; font-size: 0.95rem; color: #333; }
    .gallery-card .gallery-date { margin-top: 8px; font-size: 0.85rem; color: #666; }
    @media (max-width: 992px) {
        .gallery-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 640px) {
        .profile-card, .posts-card { padding: 18px; }
        .post-item { padding: 16px; }
        .posts-header { flex-direction: column; align-items: flex-start; }
        .gallery-grid { grid-template-columns: 1fr; }
    }
</style>
</head>

<body>

<div id="header-placeholder"></div>

<main class="container profile-container">

<div class="profile-card">
    <h2>👤 My Profile</h2>
    <p><strong>Name:</strong> <span id="uName"></span></p>
    <p><strong>Phone:</strong> <span id="uPhone"></span></p>
    <p><strong>Password:</strong> <span id="uPassword"></span></p>
</div>

<div id="posts-section" class="posts-card">
    <div class="posts-header">
        <h2>എന്റെ പോസ്റ്റുകൾ</h2>
        <span id="posts-summary"></span>
    </div>
    <div id="user-posts-list">
        <p>ലോഡ് ചെയ്യുന്നു...</p>
    </div>
</div>

<div id="gallery-section" class="posts-card">
    <div class="posts-header">
        <h2>എന്റെ ഗാലറി ചിത്രങ്ങൾ</h2>
        <span id="gallery-summary"></span>
    </div>
    <div id="user-gallery-list">
        <p>ലോഡ് ചെയ്യുന്നു...</p>
    </div>
</div>


</main>

<script src="app.js"></script>
<script>
const loggedUser = localStorage.getItem("loggedInUser") || "";
const userNameOutput = document.getElementById("uName");
const phoneOutput = document.getElementById("uPhone");
const passwordOutput = document.getElementById("uPassword");
const postsList = document.getElementById('user-posts-list');
const postsSummary = document.getElementById('posts-summary');

function showNoPostsMessage(message) {
    postsSummary.innerText = '';
    postsList.innerHTML = `<p>${message}</p>`;
}

if (!loggedUser) {
    userNameOutput.innerText = "Not logged in";
    phoneOutput.innerText = "Not available";
    passwordOutput.innerText = "Not available";
    showNoPostsMessage('ദയവായി ആദ്യം ലോഗിൻ ചെയ്യുക.');
} else {
    userNameOutput.innerText = loggedUser;
    phoneOutput.innerText = localStorage.getItem("loggedInPhone") || "Not available";
    passwordOutput.innerText = localStorage.getItem("loggedInPassword") || "Not available";

    fetch(`${WEB_APP_URL}?action=getPosts`)
        .then(response => response.json())
        .then(posts => {
            const userPosts = Array.isArray(posts) ? posts.filter(post => post.userName === loggedUser) : [];
            if (!userPosts.length) {
                showNoPostsMessage('നിങ്ങൾക്ക് ഇപ്പോൾ പോസ്റ്റുകളൊന്നുമില്ല.');
                return;
            }

            postsSummary.innerText = `${userPosts.length} പോസ്റ്റുകൾ`;
            postsList.innerHTML = '';

            userPosts.forEach(post => {
                const postItem = document.createElement('div');
                postItem.className = 'post-item';
                postItem.innerHTML = `
                    <div class="post-meta">
                        <div>
                            <h3>${post.title || 'Untitled'}</h3>
                            <small>${post.createdDate || ''}</small>
                        </div>
                        <button class="delete-btn" data-post-id="${post.postId}">Delete</button>
                    </div>
                    <p>${post.content || ''}</p>
                `;
                postsList.appendChild(postItem);
            });

            postsList.querySelectorAll('.delete-btn').forEach(button => {
                button.addEventListener('click', async () => {
                    const postId = button.dataset.postId;
                    if (!confirm('ഈ പോസ്റ്റ് നിശ്ചയമുള്ളമായി ഒഴിവാക്കണമോ?')) return;
                    button.disabled = true;
                    button.innerText = 'Deleting...';
                    try {
                        const response = await fetch(WEB_APP_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'deletePost', postId: postId, userName: loggedUser })
                        });
                        const result = await response.json();
                        if (result.status === 'success') {
                            const postItem = button.closest('.post-item');
                            if (postItem) postItem.remove();
                            const remaining = document.querySelectorAll('.post-item').length;
                            if (!remaining) {
                                showNoPostsMessage('നിങ്ങൾക്ക് ഇതിനകം എല്ലാ പോസ്റ്റുകളും ഒഴിവാക്കിയിരിക്കുന്നു.');
                            }
                            postsSummary.innerText = remaining ? `${remaining} പോസ്റ്റുകൾ` : '';
                        } else {
                            alert(result.message || 'Delete failed');
                            button.disabled = false;
                            button.innerText = 'Delete';
                        }
                    } catch (error) {
                        console.error(error);
                        alert('പോസ്റ്റ് നീക്കുന്നതിൽ പിശക് നിന്നു. വീണ്ടും ശ്രമിക്കുക.');
                        button.disabled = false;
                        button.innerText = 'Delete';
                    }
                });
            });
        })
        .catch(error => {
            console.error(error);
            showNoPostsMessage('പോസ്റ്റുകൾ ലോഡ് ചെയ്യാൻ പറ്റിയില്ല.');
        });
}

function formatGalleryDate(value) {
    if (!value) return '';
    const date = new Date(value);
    if (!isNaN(date.getTime())) {
        return date.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }
    return value;
}

function loadUserGallery() {
    const galleryList = document.getElementById('user-gallery-list');
    const gallerySummary = document.getElementById('gallery-summary');
    if (!loggedUser) {
        gallerySummary.innerText = '';
        galleryList.innerHTML = `<p>ദയവായി ആദ്യം ലോഗിൻ ചെയ്യുക.</p>`;
        return;
    }

    fetch(`${WEB_APP_URL}?action=gallery`)
        .then(response => response.json())
        .then(gallery => {
            const userGallery = Array.isArray(gallery) ? gallery.filter(item => item.userName === loggedUser) : [];
            if (!userGallery.length) {
                gallerySummary.innerText = '';
                galleryList.innerHTML = '<p>നിങ്ങളുടെ ഗാലറിയിൽ ചിത്രങ്ങൾ ഒന്നുമില്ല.</p>';
                return;
            }
            gallerySummary.innerText = `${userGallery.length} ചിത്രങ്ങൾ`;
            galleryList.innerHTML = `<div class="gallery-grid"></div>`;
            const grid = galleryList.querySelector('.gallery-grid');
            userGallery.forEach(item => {
                const card = document.createElement('div');
                card.className = 'gallery-card';
                const imgUrls = typeof buildDriveImageUrls === 'function' ? buildDriveImageUrls(item.imageUrl || '') : [item.imageUrl || 'https://via.placeholder.com/400?text=No+Image'];
                const mainImg = imgUrls[0] || 'https://via.placeholder.com/400?text=No+Image';
                card.innerHTML = `
                    <img src="${mainImg}" alt="${item.caption || 'Gallery Image'}" data-fallback="${encodeURIComponent(JSON.stringify(imgUrls))}" onerror="tryDriveFallback(this)">
                    <div class="gallery-info">
                        <p class="gallery-caption">${item.caption || 'No caption'}</p>
                        <p class="gallery-date">${formatGalleryDate(item.date)}</p>
                        <button class="delete-btn delete-image-btn" data-image-url="${item.imageUrl || ''}">Delete Image</button>
                    </div>`;
                const img = card.querySelector('img');
                if (img) {
                    img.onerror = function() {
                        tryDriveFallback(this, imgUrls);
                    };
                }
                grid.appendChild(card);
            });

            galleryList.querySelectorAll('.delete-image-btn').forEach(button => {
                button.addEventListener('click', async () => {
                    const imageUrl = button.dataset.imageUrl;
                    if (!imageUrl) return;
                    if (!confirm('ഈ ചിത്രം നീക്കണോ?')) return;
                    button.disabled = true;
                    button.innerText = 'Deleting...';
                    try {
                        const response = await fetch(WEB_APP_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'deleteImage', imageUrl: imageUrl, userName: loggedUser })
                        });
                        const result = await response.json();
                        if (result.status === 'success') {
                            const card = button.closest('.gallery-card');
                            if (card) card.remove();
                            const remaining = galleryList.querySelectorAll('.gallery-card').length;
                            if (!remaining) {
                                gallerySummary.innerText = '';
                                galleryList.innerHTML = '<p>നിങ്ങളുടെ ഗാലറിയിൽ ചിത്രങ്ങൾ ഒന്നുമില്ല.</p>';
                            } else {
                                gallerySummary.innerText = `${remaining} ചിത്രങ്ങൾ`;
                            }
                        } else {
                            alert(result.message || 'Delete failed');
                            button.disabled = false;
                            button.innerText = 'Delete Image';
                        }
                    } catch (error) {
                        console.error(error);
                        alert('ചിത്രം നീക്കുന്നതിൽ പിശക്. വീണ്ടും ശ്രമിക്കുക.');
                        button.disabled = false;
                        button.innerText = 'Delete Image';
                    }
                });
            });
        })
        .catch(error => {
            console.error(error);
            gallerySummary.innerText = '';
            galleryList.innerHTML = '<p>ഗാലറി ലോഡുചെയ്യാൻ പറ്റിയില്ല.</p>';
        });
}

loadUserGallery();
</script>

</body>
</html>
